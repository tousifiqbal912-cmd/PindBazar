kind = "web"
previewPath = "/"
title = "PindBazaar"
version = "1.0.0"
id = "artifacts/pindbazaar"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21161

[services.development]
run = "pnpm --filter @workspace/pindbazaar run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pindbazaar", "run", "build" ]
serve = "static"
publicDir = "artifacts/pindbazaar/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21161"
BASE_PATH = "/"
